<!DOCTYPE html>
<!-- CONTACT  ·  Edit: [EMAIL] [SOCIAL] -->
<html lang="en" data-theme="teal">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — William Goetjen</title>
<meta name="description" content="Contact William Goetjen — organic growth content creator." />
<link rel="stylesheet" href="style.css" />
<script>(function(){try{var t=localStorage.getItem('nentbu-theme');if(t)document.documentElement.setAttribute('data-theme',t);var w=localStorage.getItem('nentbu-wallpaper-src');if(w)document.documentElement.style.setProperty('--wallpaper-img','url("'+w+'")');}catch(e){}})();</script>
</head>
<body data-page="contact" data-win-title="Contact — New Message">

<div class="screen">
  <div class="workspace">
    <div class="window" role="dialog" aria-label="Contact">
      <div class="title-bar">
        <div class="title-bar-text">
          <svg viewBox="0 0 32 32"><rect x="4" y="9" width="24" height="15" fill="#fff" stroke="#000"/><path d="M4 9 L16 18 L28 9" fill="none" stroke="#000"/></svg>
          Contact &mdash; New Message
        </div>
        <div class="title-bar-controls">
          <button data-action="min" aria-label="Minimize"><span class="g-min"></span></button>
          <button data-action="max" aria-label="Maximize"><span class="g-max"></span></button>
          <button data-action="close" aria-label="Close"><span class="g-close">&#10005;</span></button>
        </div>
      </div>
      <div class="menu-bar"><span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>I</u>nsert</span><span><u>H</u>elp</span></div>
      <div class="window-body">
        <div class="doc-head">
          <svg class="big-ico" viewBox="0 0 32 32"><rect x="4" y="9" width="24" height="15" fill="#fff" stroke="#000"/><path d="M4 9 L16 18 L28 9" fill="none" stroke="#000"/></svg>
          <div><h1>Get in touch</h1><div class="subtitle">For collaborations, partnerships, and roles.</div></div>
        </div>

        <div class="two-col">
          <div>
            <div class="form-row" style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px;">
              <label for="cf-name">Name</label>
              <input class="input95" id="cf-name" type="text" placeholder="Your name" style="font-family:var(--font);font-size:13px;background:#fff;box-shadow:var(--sunken);border:none;padding:6px 8px;" />
            </div>
            <div class="form-row" style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px;">
              <label for="cf-email">Your email</label>
              <input class="input95" id="cf-email" type="email" placeholder="you@example.com" style="font-family:var(--font);font-size:13px;background:#fff;box-shadow:var(--sunken);border:none;padding:6px 8px;" />
            </div>
            <div class="form-row" style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px;">
              <label for="cf-msg">Message</label>
              <textarea class="input95" id="cf-msg" placeholder="Tell me about the project&hellip;" style="font-family:var(--font);font-size:13px;background:#fff;box-shadow:var(--sunken);border:none;padding:6px 8px;resize:vertical;min-height:96px;"></textarea>
            </div>
            <div class="btn-row" style="margin-top:4px;">
              <button class="btn95 primary" id="cf-send">Send</button>
              <button class="btn95" id="cf-clear">Clear</button>
            </div>
          </div>

          <div>
            <fieldset class="fieldset" style="margin-top:0;">
              <span class="panel-label">Direct</span>
              <!-- [EMAIL] -->
              <p style="margin:0 0 10px;"><a href="mailto:hello@williamgoetjen.com">hello@williamgoetjen.com</a></p>
              <p style="margin:0;font-size:12px;color:#444;">New York, USA</p>
            </fieldset>
            <fieldset class="fieldset">
              <span class="panel-label">Find me online</span>
              <!-- [SOCIAL] replace # with your profile URLs -->
              <div class="btn-row" style="margin-top:0;flex-direction:column;">
                <a class="btn95" href="#" style="justify-content:flex-start;">TikTok &mdash; @grizzlypng</a>
                <a class="btn95" href="#" style="justify-content:flex-start;">YouTube &mdash; GrizzlyPNG</a>
                <a class="btn95" href="#" style="justify-content:flex-start;">Instagram &mdash; @grizzlypng</a>
                <a class="btn95" href="#" style="justify-content:flex-start;">X / Twitter &mdash; @grizzlypng</a>
              </div>
            </fieldset>
          </div>
        </div>
      </div>
      <div class="status-bar"><div class="cell grow">Ready to send</div><div class="cell">Online</div></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  (function () {
    var to = "hello@williamgoetjen.com"; // [EMAIL] change to your address
    var send = document.getElementById("cf-send"), clear = document.getElementById("cf-clear");
    if (send) send.addEventListener("click", function () {
      var n = (document.getElementById("cf-name").value || "").trim();
      var e = (document.getElementById("cf-email").value || "").trim();
      var m = (document.getElementById("cf-msg").value || "").trim();
      var subject = encodeURIComponent("Portfolio enquiry" + (n ? " from " + n : ""));
      var body = encodeURIComponent(m + (e ? "\n\n— " + n + " (" + e + ")" : ""));
      window.location.href = "mailto:" + to + "?subject=" + subject + "&body=" + body;
    });
    if (clear) clear.addEventListener("click", function () {
      ["cf-name","cf-email","cf-msg"].forEach(function(id){var el=document.getElementById(id);if(el)el.value="";});
    });
  })();
</script>
</body>
</html>
