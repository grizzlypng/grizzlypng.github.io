<!DOCTYPE html>
<!-- DISPLAY PROPERTIES (settings)  ·  Wallpapers + color schemes.
     Wallpaper images + theme list are configured in script.js. -->
<html lang="en" data-theme="teal">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Display Properties — NENTBU OS</title>
<meta name="description" content="Customize wallpaper and color scheme." />
<link rel="stylesheet" href="style.css" />
<script>(function(){try{var t=localStorage.getItem('nentbu-theme');if(t)document.documentElement.setAttribute('data-theme',t);var w=localStorage.getItem('nentbu-wallpaper-src');if(w)document.documentElement.style.setProperty('--wallpaper-img','url("'+w+'")');}catch(e){}})();</script>
</head>
<body data-page="settings" data-win-title="Display Properties">

<div class="screen">
  <div class="workspace">
    <div class="window" role="dialog" aria-label="Display Properties">
      <div class="title-bar">
        <div class="title-bar-text">
          <svg viewBox="0 0 32 32"><rect x="4" y="6" width="24" height="16" fill="#c0c0c0" stroke="#000"/><rect x="6" y="8" width="7" height="12" fill="#e84393"/><rect x="13" y="8" width="6" height="12" fill="#5a7edc"/><rect x="19" y="8" width="7" height="12" fill="#f6d55c"/></svg>
          Display Properties
        </div>
        <div class="title-bar-controls">
          <button data-action="min" aria-label="Minimize"><span class="g-min"></span></button>
          <button data-action="max" aria-label="Maximize"><span class="g-max"></span></button>
          <button data-action="close" aria-label="Close"><span class="g-close">&#10005;</span></button>
        </div>
      </div>
      <div class="menu-bar"><span><u>F</u>ile</span><span><u>H</u>elp</span></div>
      <div class="window-body">
        <h1 style="font-size:16px;margin-bottom:2px;">Personalize NENTBU OS</h1>
        <div class="subtitle">Pick a wallpaper and a color scheme. Your choice is remembered on every page.</div>
        <!-- tabs, panels, and OK/Cancel/Apply render here -->
        <div id="settings-mount"></div>
      </div>
      <div class="status-bar"><div class="cell grow">Ready</div><div class="cell">Display</div></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
