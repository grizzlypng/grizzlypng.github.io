<!DOCTYPE html>
<!-- MY VIDEOS (fake YouTube)  ·  Edit video IDs in script.js (VIDEOS list) -->
<html lang="en" data-theme="teal">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Videos — William Goetjen</title>
<meta name="description" content="Videos by William Goetjen / GrizzlyPNG." />
<link rel="stylesheet" href="style.css" />
<script>(function(){try{var t=localStorage.getItem('nentbu-theme');if(t)document.documentElement.setAttribute('data-theme',t);var w=localStorage.getItem('nentbu-wallpaper-src');if(w)document.documentElement.style.setProperty('--wallpaper-img','url("'+w+'")');}catch(e){}})();</script>
</head>
<body data-page="videos" data-win-title="My Videos — NENTBU Tube">

<div class="screen">
  <div class="workspace">
    <div class="window wide" role="dialog" aria-label="My Videos">
      <div class="title-bar">
        <div class="title-bar-text">
          <svg viewBox="0 0 32 32"><rect x="4" y="8" width="24" height="16" rx="4" fill="#cc0000" stroke="#000"/><path d="M14 13 L14 19 L20 16 Z" fill="#fff"/></svg>
          My Videos &mdash; NENTBU Tube
        </div>
        <div class="title-bar-controls">
          <button data-action="min" aria-label="Minimize"><span class="g-min"></span></button>
          <button data-action="max" aria-label="Maximize"><span class="g-max"></span></button>
          <button data-action="close" aria-label="Close"><span class="g-close">&#10005;</span></button>
        </div>
      </div>
      <div class="menu-bar"><span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span><u>H</u>elp</span></div>

      <div class="window-body tube" style="padding:0;">
        <div class="tube-head">
          <div class="tube-logo"><span class="play">&#9658;</span> NENTBU Tube</div>
          <div class="tube-search">
            <input type="text" placeholder="Search my channel&hellip;" aria-label="Search (demo)" />
            <button type="button">Search</button>
          </div>
        </div>
        <div class="tube-body">
          <!-- player + grid render here from the VIDEOS list in script.js -->
          <div id="tube-mount"></div>
        </div>
      </div>

      <div class="status-bar"><div class="cell grow">NENTBU Tube &mdash; your uploads</div><div class="cell">Connected</div></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
